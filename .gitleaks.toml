# Gitleaks config for Relay. Extends the built-in default ruleset and adds
# project-specific rules that mirror lefthook's `forbid-api-keys` pre-commit
# check (OPENROUTER_API_KEY / ANTHROPIC_API_KEY / SUPABASE_SERVICE_ROLE with
# sk-/or-/eyJ prefixes). Pre-commit catches before push; this config is what CI
# (.github/workflows/secrets-scan.yml) uses to catch anything that bypassed the hook.

# Pull in all of gitleaks' default rules, then layer ours on top.
[extend]
useDefault = true

[[rules]]
id = "relay-project-llm-key"
description = "Hardcoded Relay LLM/service key (OpenRouter / Anthropic / Supabase service role)"
regex = '''(?i)(OPENROUTER_API_KEY|ANTHROPIC_API_KEY|SUPABASE_SERVICE_ROLE)\s*[:=]\s*["']?(sk-|or-|eyJ)[A-Za-z0-9_\-\.=]{8,}'''
tags = ["key", "relay"]

[allowlist]
description = "Paths that legitimately contain placeholder or fixture-style secrets"
paths = [
  '''\.env\.example$''',
  '''.*\.test\.ts$''',
  '''.*\.test\.tsx$''',
  # Python test fixtures (agents/tests/test_*.py + */tests/test_*.py + *_test.py)
  # contain synthetic secrets used to verify redaction / parsing / auth logic.
  # Without this allowlist the redaction unit tests (test_redaction.py) trip
  # the jwt + generic-api-key rules.
  '''.*tests/test_.*\.py$''',
  '''.*_test\.py$''',
  '''infra/postgres/migrations/.*''',
  '''bun\.lock$''',
  '''uv\.lock$''',
  '''\.gitleaks\.toml$''',
  # Smoke scripts use synthetic per-run PASSWORDs (never real credentials).
  # The current source builds the value at runtime so no high-entropy literal
  # ships in the file; this entry covers any future inline literals.
  '''scripts/post-upload-ui-smoke\.mjs$''',
]
# Historical commits where we know the finding was a synthetic test password
# (the source has since been refactored to build the value at runtime). The
# commit can't be rewritten without force-pushing the PR branch, which would
# invalidate review history.
commits = [
  # PR #26 (feat/dock-multi-session-and-reply-locale) — `PASSWORD = "smoke-pw-12345"`
  # in scripts/post-upload-ui-smoke.mjs:36. Refactored away in 632fadd.
  "7a8a7d7411a2a455f27a2762d4beab95930f35f8",
]
