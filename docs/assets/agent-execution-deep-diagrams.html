<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent执行架构深度图</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'SF Mono','Fira Code',Consolas,monospace;background:#0d1117;color:#e6edf3;padding:28px 20px;min-height:100vh}
.nav{display:flex;gap:8px;margin-bottom:36px;flex-wrap:wrap}
.nb{padding:8px 16px;border-radius:6px;border:1px solid #30363d;background:#161b22;color:#8b949e;cursor:pointer;font-family:inherit;font-size:11px;letter-spacing:.5px;transition:all .15s}
.nb.active{background:#1f6feb;border-color:#1f6feb;color:#fff}
.nb:hover:not(.active){background:#21262d;color:#e6edf3}
.sec{display:none}.sec.active{display:block}
h2{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:#8b949e;margin-bottom:20px}
.wrap{background:#0d1117;border:1px solid #30363d;border-radius:10px;padding:28px;overflow-x:auto}
svg text{font-family:'SF Mono','Fira Code',monospace}
.leg{display:flex;gap:18px;flex-wrap:wrap;margin-top:16px;padding:10px 14px;background:#161b22;border-radius:6px;border:1px solid #21262d}
.li{display:flex;align-items:center;gap:5px;font-size:10px;color:#8b949e}
.ld{width:10px;height:10px;border-radius:2px;border:1.5px solid}
</style>
</head>
<body>

<div class="nav">
  <button class="nb active" onclick="show('react')">① ReAct 执行循环</button>
  <button class="nb" onclick="show('sandbox')">② Sandbox 架构</button>
  <button class="nb" onclick="show('tools')">③ Tool 执行层</button>
  <button class="nb" onclick="show('browser')">④ 浏览器自动化</button>
  <button class="nb" onclick="show('stack')">⑤ 完整执行栈</button>
</div>

<!-- ═══════════════════════════════════════════
     1. ReAct LOOP
═══════════════════════════════════════════ -->
<div id="react" class="sec active">
<h2>① ReAct Agentic 执行循环（Reasoning + Acting）</h2>
<div class="wrap">
<svg width="1000" height="740" viewBox="0 0 1000 740">
<defs>
  <marker id="r1" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3z" fill="#484f58"/></marker>
  <marker id="r1g" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3z" fill="#3fb950"/></marker>
  <marker id="r1b" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3z" fill="#58a6ff"/></marker>
  <marker id="r1p" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3z" fill="#d2a8ff"/></marker>
  <marker id="r1r" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3z" fill="#f85149"/></marker>
  <marker id="r1o" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3z" fill="#ffa657"/></marker>
</defs>

<!-- ── Left column: Loop steps ── -->

<!-- Entry -->
<rect x="20" y="20" width="220" height="54" rx="8" fill="#1a2e24" stroke="#3fb950" stroke-width="1.5"/>
<text x="130" y="42" fill="#7ee787" font-size="12" font-weight="700" text-anchor="middle">User Task Input</text>
<text x="130" y="60" fill="#8b949e" font-size="9" text-anchor="middle">"submit to Google Backend role"</text>

<!-- State init -->
<rect x="20" y="110" width="220" height="70" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
<text x="130" y="130" fill="#e6edf3" font-size="11" font-weight="700" text-anchor="middle">State Initializer</text>
<text x="130" y="146" fill="#8b949e" font-size="9" text-anchor="middle">messages: []  ·  iterations: 0</text>
<text x="130" y="160" fill="#8b949e" font-size="9" text-anchor="middle">token_budget: 80k  ·  cost: $0.00</text>
<text x="130" y="174" fill="#8b949e" font-size="9" text-anchor="middle">sandbox_id: sandbox-{uuid}</text>

<!-- THINK box (core) -->
<rect x="20" y="220" width="220" height="110" rx="8" fill="#271f3d" stroke="#a371f7" stroke-width="2"/>
<text x="130" y="244" fill="#c9b1f7" font-size="13" font-weight="700" text-anchor="middle">① THINK</text>
<text x="130" y="262" fill="#8b949e" font-size="9" text-anchor="middle">Claude receives:</text>
<text x="130" y="277" fill="#8b949e" font-size="9" text-anchor="middle">system_prompt + task + history</text>
<text x="130" y="292" fill="#8b949e" font-size="9" text-anchor="middle">+ tool_schemas (20 tools)</text>
<text x="130" y="307" fill="#c9b1f7" font-size="9" font-weight="700" text-anchor="middle">→ text reasoning OR tool_use</text>
<text x="130" y="322" fill="#8b949e" font-size="9" text-anchor="middle">model: opus-4 (agentic tasks)</text>

<!-- DECIDE diamond -->
<polygon points="130,380 200,420 130,460 60,420" fill="#21262d" stroke="#8b949e" stroke-width="1.5"/>
<text x="130" y="414" fill="#e6edf3" font-size="10" font-weight="700" text-anchor="middle">DECIDE</text>
<text x="130" y="428" fill="#8b949e" font-size="8" text-anchor="middle">text only</text>
<text x="130" y="440" fill="#8b949e" font-size="8" text-anchor="middle">OR tool_use?</text>

<!-- ACT box -->
<rect x="20" y="500" width="220" height="90" rx="8" fill="#1c2c4a" stroke="#58a6ff" stroke-width="2"/>
<text x="130" y="524" fill="#79c0ff" font-size="13" font-weight="700" text-anchor="middle">② ACT</text>
<text x="130" y="542" fill="#8b949e" font-size="9" text-anchor="middle">Tool Dispatcher routes call:</text>
<text x="130" y="557" fill="#58a6ff" font-size="9" text-anchor="middle">bash / browser / api / file</text>
<text x="130" y="572" fill="#8b949e" font-size="9" text-anchor="middle">executes in sandbox</text>
<text x="130" y="587" fill="#8b949e" font-size="9" text-anchor="middle">timeout: 30s per tool call</text>

<!-- OBSERVE -->
<rect x="20" y="630" width="220" height="80" rx="8" fill="#2a1f1a" stroke="#ffa657" stroke-width="2"/>
<text x="130" y="654" fill="#ffa657" font-size="13" font-weight="700" text-anchor="middle">③ OBSERVE</text>
<text x="130" y="672" fill="#8b949e" font-size="9" text-anchor="middle">tool_result appended to history</text>
<text x="130" y="687" fill="#8b949e" font-size="9" text-anchor="middle">cost tracker updated</text>
<text x="130" y="700" fill="#8b949e" font-size="9" text-anchor="middle">→ back to THINK (next iter)</text>

<!-- ── Right column: Guards + Exit ── -->

<!-- HITL checkpoint -->
<rect x="500" y="480" width="240" height="130" rx="8" fill="#2a0f0f" stroke="#f85149" stroke-width="2"/>
<text x="620" y="504" fill="#ff7b72" font-size="12" font-weight="700" text-anchor="middle">⛔ HITL Checkpoint</text>
<text x="620" y="522" fill="#8b949e" font-size="9" text-anchor="middle">Triggers: submit_form, send_email</text>
<text x="620" y="537" fill="#8b949e" font-size="9" text-anchor="middle">delete_*, purchase_*, credentials</text>
<text x="620" y="552" fill="#8b949e" font-size="9" text-anchor="middle">Pause loop → save state → notify</text>
<text x="620" y="567" fill="#8b949e" font-size="9" text-anchor="middle">user approves/rejects via WebSocket</text>
<text x="620" y="582" fill="#8b949e" font-size="9" text-anchor="middle">timeout 5min → auto-abort</text>
<text x="620" y="597" fill="#ff7b72" font-size="9" font-weight="700" text-anchor="middle">NO auto-submit without approval</text>

<!-- Loop guards -->
<rect x="500" y="220" width="240" height="220" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
<text x="620" y="244" fill="#e6edf3" font-size="11" font-weight="700" text-anchor="middle">Loop Guards</text>
<line x1="510" y1="254" x2="730" y2="254" stroke="#21262d"/>
<text x="620" y="271" fill="#ff7b72" font-size="9" text-anchor="middle">max_iterations: 20</text>
<text x="620" y="287" fill="#8b949e" font-size="9" text-anchor="middle">if exceeded → abort + summary</text>
<text x="620" y="308" fill="#ff7b72" font-size="9" text-anchor="middle">token_budget: 80,000</text>
<text x="620" y="324" fill="#8b949e" font-size="9" text-anchor="middle">context compressor if >60k tokens</text>
<text x="620" y="344" fill="#ff7b72" font-size="9" text-anchor="middle">cost_limit: $0.50 / session</text>
<text x="620" y="360" fill="#8b949e" font-size="9" text-anchor="middle">if exceeded → pause + notify</text>
<text x="620" y="380" fill="#ff7b72" font-size="9" text-anchor="middle">timeout: 300s total</text>
<text x="620" y="396" fill="#8b949e" font-size="9" text-anchor="middle">wall-clock limit per session</text>
<text x="620" y="416" fill="#ffa657" font-size="9" text-anchor="middle">error_count: max 3</text>
<text x="620" y="432" fill="#8b949e" font-size="9" text-anchor="middle">consecutive errors → abort</text>

<!-- Context compressor -->
<rect x="500" y="80" width="240" height="110" rx="8" fill="#21262d" stroke="#484f58" stroke-width="1"/>
<text x="620" y="104" fill="#e6edf3" font-size="11" font-weight="700" text-anchor="middle">Context Window Manager</text>
<line x1="510" y1="114" x2="730" y2="114"/>
<text x="620" y="131" fill="#8b949e" font-size="9" text-anchor="middle">track token usage per message</text>
<text x="620" y="147" fill="#8b949e" font-size="9" text-anchor="middle">if &gt;60k: compress old observations</text>
<text x="620" y="163" fill="#8b949e" font-size="9" text-anchor="middle">keep: system + last 5 turns + task</text>
<text x="620" y="179" fill="#8b949e" font-size="9" text-anchor="middle">summarize older: "steps 1-8 summary"</text>

<!-- Done / Exit -->
<rect x="500" y="650" width="240" height="70" rx="8" fill="#1a2e24" stroke="#3fb950" stroke-width="1.5"/>
<text x="620" y="675" fill="#7ee787" font-size="12" font-weight="700" text-anchor="middle">✓ Task Complete</text>
<text x="620" y="693" fill="#8b949e" font-size="9" text-anchor="middle">final result + cost report + trace</text>
<text x="620" y="707" fill="#8b949e" font-size="9" text-anchor="middle">sandbox.destroy() · log audit</text>

<!-- Iteration counter (visual loop indicator) -->
<rect x="280" y="380" width="180" height="90" rx="8" fill="#161b22" stroke="#484f58" stroke-width="1" stroke-dasharray="5 3"/>
<text x="370" y="404" fill="#8b949e" font-size="10" font-weight="700" text-anchor="middle">Loop State</text>
<text x="370" y="422" fill="#56d364" font-size="9" text-anchor="middle">iteration: 3 / 20</text>
<text x="370" y="438" fill="#56d364" font-size="9" text-anchor="middle">tokens: 12,400 / 80,000</text>
<text x="370" y="454" fill="#56d364" font-size="9" text-anchor="middle">cost: $0.03 / $0.50</text>
<text x="370" y="462" fill="#ffa657" font-size="8" text-anchor="middle">─────────────────</text>

<!-- Text-only exit path label -->
<text x="300" y="403" fill="#56d364" font-size="9">done</text>

<!-- ARROWS -->
<line x1="130" y1="74" x2="130" y2="110" stroke="#3fb950" stroke-width="1.5" marker-end="url(#r1g)"/>
<line x1="130" y1="180" x2="130" y2="220" stroke="#484f58" stroke-width="1.5" marker-end="url(#r1)"/>
<line x1="130" y1="330" x2="130" y2="380" stroke="#a371f7" stroke-width="1.5" marker-end="url(#r1p)"/>
<!-- DECIDE → text only = done -->
<path d="M200,420 C260,420 280,420 280,420" stroke="#56d364" stroke-width="1.5" fill="none" marker-end="url(#r1g)"/>
<text x="210" y="413" fill="#56d364" font-size="8">text_only</text>
<!-- DECIDE → tool_use = ACT -->
<line x1="130" y1="460" x2="130" y2="500" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#r1b)"/>
<text x="140" y="486" fill="#58a6ff" font-size="8">tool_use</text>
<line x1="130" y1="590" x2="130" y2="630" stroke="#ffa657" stroke-width="1.5" marker-end="url(#r1o)"/>
<!-- OBSERVE → back to THINK (loop arrow left side) -->
<path d="M20,670 C-20,670 -20,275 20,275" stroke="#a371f7" stroke-width="1.5" fill="none" stroke-dasharray="5 3" marker-end="url(#r1p)"/>
<text x="-50" y="475" fill="#a371f7" font-size="9" transform="rotate(-90,-50,475)">next iteration</text>

<!-- ACT → HITL (if risky action) -->
<path d="M240,545 C370,545 500,545 500,545" stroke="#f85149" stroke-width="1.5" fill="none" stroke-dasharray="5 3" marker-end="url(#r1r)"/>
<text x="310" y="538" fill="#f85149" font-size="8">risky action?</text>
<!-- HITL approve → continue ACT -->
<path d="M500,600 C400,600 240,600 240,580" stroke="#3fb950" stroke-width="1" fill="none" stroke-dasharray="4 3" marker-end="url(#r1g)"/>
<text x="350" y="616" fill="#3fb950" font-size="8">approved</text>

<!-- Loop guards → THINK context -->
<path d="M500,260 C470,260 260,260 260,275" stroke="#484f58" stroke-width="1" fill="none" stroke-dasharray="4 3" marker-end="url(#r1)"/>
<!-- Context mgr → THINK -->
<path d="M500,135 C300,135 240,200 240,235" stroke="#484f58" stroke-width="1" fill="none" stroke-dasharray="4 3" marker-end="url(#r1)"/>

<!-- Done state from loop state box -->
<path d="M460,425 C480,425 500,690 500,685" stroke="#3fb950" stroke-width="1" fill="none" stroke-dasharray="4 3" marker-end="url(#r1g)"/>
<text x="468" y="560" fill="#3fb950" font-size="8">complete</text>
</svg>
</div>
<div class="leg">
  <div class="li"><div class="ld" style="background:#271f3d;border-color:#a371f7"></div>LLM Think</div>
  <div class="li"><div class="ld" style="background:#1c2c4a;border-color:#58a6ff"></div>Tool Act</div>
  <div class="li"><div class="ld" style="background:#2a1f1a;border-color:#ffa657"></div>Observe</div>
  <div class="li"><div class="ld" style="background:#2a0f0f;border-color:#f85149"></div>HITL Checkpoint</div>
  <div class="li"><div class="ld" style="background:#161b22;border-color:#30363d"></div>Loop Guard</div>
  <div class="li"><div class="ld" style="background:#1a2e24;border-color:#3fb950"></div>Entry / Exit</div>
</div>
</div>


<!-- ═══════════════════════════════════════════
     2. SANDBOX
═══════════════════════════════════════════ -->
<div id="sandbox" class="sec">
<h2>② Sandbox 隔离架构</h2>
<div class="wrap">
<svg width="1000" height="720" viewBox="0 0 1000 720">
<defs>
  <marker id="s1" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3z" fill="#484f58"/></marker>
  <marker id="s1g" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3z" fill="#3fb950"/></marker>
  <marker id="s1r" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3z" fill="#f85149"/></marker>
</defs>

<!-- Host Machine border -->
<rect x="10" y="10" width="980" height="700" rx="12" fill="#0d1117" stroke="#21262d" stroke-width="2"/>
<text x="26" y="30" fill="#484f58" font-size="9" font-weight="600" letter-spacing="2">HOST MACHINE (Railway / Fly.io)</text>

<!-- Orchestration layer top -->
<rect x="30" y="44" width="940" height="60" rx="8" fill="#1a2e24" stroke="#3fb950" stroke-width="1.5"/>
<text x="500" y="64" fill="#7ee787" font-size="11" font-weight="700" text-anchor="middle">Orchestration Layer</text>
<text x="200" y="90" fill="#8b949e" font-size="9" text-anchor="middle">Agent Coordinator (Node.js)</text>
<text x="500" y="90" fill="#8b949e" font-size="9" text-anchor="middle">Sandbox Manager · Session Registry · Resource Enforcer</text>
<text x="800" y="90" fill="#8b949e" font-size="9" text-anchor="middle">Bull Queue · Event Bus</text>

<!-- Sandbox Lifecycle labels -->
<text x="30" y="128" fill="#484f58" font-size="9" font-weight="600" letter-spacing="1.5">SANDBOX LIFECYCLE</text>
<rect x="30" y="136" width="940" height="36" rx="6" fill="#161b22" stroke="#21262d"/>
<text x="115" y="154" fill="#56d364" font-size="9" text-anchor="middle">1. Request arrives</text>
<text x="115" y="166" fill="#8b949e" font-size="8" text-anchor="middle">user_id + task</text>
<text x="265" y="154" fill="#56d364" font-size="9" text-anchor="middle">2. Spawn container</text>
<text x="265" y="166" fill="#8b949e" font-size="8" text-anchor="middle">docker run --rm ...</text>
<text x="415" y="154" fill="#56d364" font-size="9" text-anchor="middle">3. Inject config</text>
<text x="415" y="166" fill="#8b949e" font-size="8" text-anchor="middle">env vars, creds (masked)</text>
<text x="585" y="154" fill="#56d364" font-size="9" text-anchor="middle">4. Execute agent</text>
<text x="585" y="166" fill="#8b949e" font-size="8" text-anchor="middle">ReAct loop runs</text>
<text x="745" y="154" fill="#56d364" font-size="9" text-anchor="middle">5. Collect outputs</text>
<text x="745" y="166" fill="#8b949e" font-size="8" text-anchor="middle">results → main DB</text>
<text x="900" y="154" fill="#f85149" font-size="9" text-anchor="middle">6. Destroy</text>
<text x="900" y="166" fill="#8b949e" font-size="8" text-anchor="middle">rm container + tmpfs</text>

<!-- User A sandbox -->
<rect x="30" y="192" width="460" height="400" rx="10" fill="#0f0f1a" stroke="#7c3aed" stroke-width="2"/>
<text x="260" y="214" fill="#c084fc" font-size="11" font-weight="700" text-anchor="middle">Sandbox A  ·  user_id: alice-123</text>
<text x="260" y="230" fill="#8b949e" font-size="9" text-anchor="middle">docker run --rm --memory=512m --cpus=0.5 --network=sandboxnet-alice</text>

<!-- Inside Sandbox A -->
<!-- Filesystem -->
<rect x="50" y="244" width="200" height="120" rx="6" fill="#161b22" stroke="#484f58" stroke-width="1"/>
<text x="150" y="264" fill="#e6edf3" font-size="10" font-weight="700" text-anchor="middle">Ephemeral Filesystem</text>
<line x1="60" y1="272" x2="240" y2="272" stroke="#21262d"/>
<text x="150" y="288" fill="#8b949e" font-size="9" text-anchor="middle">/tmp/work/ ← tmpfs (RAM)</text>
<text x="150" y="302" fill="#8b949e" font-size="9" text-anchor="middle">/app/resume.pdf (injected)</text>
<text x="150" y="316" fill="#8b949e" font-size="9" text-anchor="middle">/app/output/ (results)</text>
<text x="150" y="330" fill="#f85149" font-size="9" text-anchor="middle">NO access to other users</text>
<text x="150" y="346" fill="#f85149" font-size="9" text-anchor="middle">NO persistent write outside /output</text>
<text x="150" y="356" fill="#8b949e" font-size="8" text-anchor="middle">destroyed on container exit</text>

<!-- Network -->
<rect x="270" y="244" width="200" height="120" rx="6" fill="#161b22" stroke="#484f58" stroke-width="1"/>
<text x="370" y="264" fill="#e6edf3" font-size="10" font-weight="700" text-anchor="middle">Network Policy</text>
<line x1="280" y1="272" x2="460" y2="272" stroke="#21262d"/>
<text x="370" y="288" fill="#56d364" font-size="9" text-anchor="middle">✓ api.greenhouse.io</text>
<text x="370" y="302" fill="#56d364" font-size="9" text-anchor="middle">✓ api.lever.co</text>
<text x="370" y="316" fill="#56d364" font-size="9" text-anchor="middle">✓ target_job_url (whitelist)</text>
<text x="370" y="330" fill="#f85149" font-size="9" text-anchor="middle">✗ 10.x.x.x (internal)</text>
<text x="370" y="344" fill="#f85149" font-size="9" text-anchor="middle">✗ metadata.google.internal</text>
<text x="370" y="358" fill="#f85149" font-size="9" text-anchor="middle">✗ other sandboxes</text>

<!-- Process env -->
<rect x="50" y="384" width="420" height="80" rx="6" fill="#161b22" stroke="#484f58" stroke-width="1"/>
<text x="260" y="402" fill="#e6edf3" font-size="10" font-weight="700" text-anchor="middle">Process Environment</text>
<line x1="60" y1="410" x2="460" y2="410" stroke="#21262d"/>
<text x="150" y="426" fill="#8b949e" font-size="9" text-anchor="middle">USER_ID=alice-123</text>
<text x="370" y="426" fill="#8b949e" font-size="9" text-anchor="middle">SESSION_ID=sess-abc</text>
<text x="150" y="442" fill="#8b949e" font-size="9" text-anchor="middle">ANTHROPIC_API_KEY=***</text>
<text x="370" y="442" fill="#8b949e" font-size="9" text-anchor="middle">COST_LIMIT=0.50</text>
<text x="260" y="458" fill="#f85149" font-size="9" text-anchor="middle">credentials NEVER stored in filesystem</text>

<!-- Resource limits -->
<rect x="50" y="484" width="420" height="90" rx="6" fill="#2a0f0f" stroke="#f85149" stroke-width="1"/>
<text x="260" y="504" fill="#ff7b72" font-size="10" font-weight="700" text-anchor="middle">Resource Limits (enforced by cgroups)</text>
<line x1="60" y1="512" x2="460" y2="512" stroke="#3d1515"/>
<text x="150" y="528" fill="#8b949e" font-size="9" text-anchor="middle">memory: 512 MB hard</text>
