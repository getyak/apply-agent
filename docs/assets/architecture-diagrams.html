<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>求职Agent系统架构图</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    background: #0d1117;
    color: #e6edf3;
    padding: 32px 24px;
    min-height: 100vh;
  }

  .nav {
    display: flex;
    gap: 8px;
    margin-bottom: 40px;
    flex-wrap: wrap;
  }
  .nav-btn {
    padding: 8px 18px;
    border-radius: 6px;
    border: 1px solid #30363d;
    background: #161b22;
    color: #8b949e;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 0.5px;
    transition: all 0.15s;
  }
  .nav-btn.active {
    background: #1f6feb;
    border-color: #1f6feb;
    color: #fff;
  }
  .nav-btn:hover:not(.active) {
    background: #21262d;
    color: #e6edf3;
  }

  .diagram-section { display: none; }
  .diagram-section.active { display: block; }

  h2 {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #8b949e;
    margin-bottom: 24px;
  }

  /* ─── SVG wrapper ─── */
  .svg-wrap {
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 12px;
    padding: 32px;
    overflow-x: auto;
  }

  svg text { font-family: 'SF Mono', 'Fira Code', monospace; }

  /* ─── Shared SVG node styles via CSS classes ─── */
  .node-ui     { fill: #1c2c4a; stroke: #58a6ff; stroke-width: 1.5; }
  .node-api    { fill: #1a2e24; stroke: #3fb950; stroke-width: 1.5; }
  .node-agent  { fill: #2d1f3d; stroke: #d2a8ff; stroke-width: 1.5; }
  .node-data   { fill: #2a1f1a; stroke: #f0883e; stroke-width: 1.5; }
  .node-ext    { fill: #1e2433; stroke: #8b949e; stroke-width: 1; stroke-dasharray: 5 3; }
  .node-queue  { fill: #1f2a1a; stroke: #56d364; stroke-width: 1.5; }
  .node-cache  { fill: #2a2020; stroke: #f85149; stroke-width: 1.5; }
  .node-llm    { fill: #271f3d; stroke: #a371f7; stroke-width: 2; }

  .label-ui    { fill: #79c0ff; font-size: 11px; font-weight: 700; }
  .label-api   { fill: #7ee787; font-size: 11px; font-weight: 700; }
  .label-agent { fill: #d2a8ff; font-size: 11px; font-weight: 700; }
  .label-data  { fill: #ffa657; font-size: 11px; font-weight: 700; }
  .label-ext   { fill: #8b949e; font-size: 11px; }
  .label-queue { fill: #56d364; font-size: 11px; font-weight: 700; }
  .label-cache { fill: #ff7b72; font-size: 11px; font-weight: 700; }
  .label-llm   { fill: #c9b1f7; font-size: 11px; font-weight: 700; }

  .sub-label   { fill: #8b949e; font-size: 9px; }
  .arrow       { stroke: #30363d; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
  .arrow-hi    { stroke: #58a6ff; stroke-width: 1.5; fill: none; marker-end: url(#arrow-hi); stroke-dasharray: 6 3; }
  .arrow-ev    { stroke: #3fb950; stroke-width: 1.2; fill: none; marker-end: url(#arrow-ev); stroke-dasharray: 4 4; }

  .section-label {
    fill: none;
    stroke: #21262d;
    stroke-width: 1;
    rx: 8;
  }
  .section-text {
    fill: #484f58;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* legend */
  .legend {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    margin-top: 20px;
    padding: 12px 16px;
    background: #161b22;
    border-radius: 8px;
    border: 1px solid #21262d;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: #8b949e;
  }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 2px;
    border: 1.5px solid;
  }
</style>
</head>
<body>

<!-- NAV -->
<div class="nav">
  <button class="nav-btn active" onclick="show('system')">① 系统总架构</button>

  <div class="svg-wrap">

    <defs>

  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
}
</script>
</body>
