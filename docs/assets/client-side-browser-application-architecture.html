<div class="wrap">

<rect x="340" y="10" width="320" height="620" rx="10" fill="#0d1117" stroke="#1a3a26" stroke-width="1.5"/>

<text x="170" y="258" fill="#8b949e" font-size="9" text-anchor="middle">用户真实指纹+IP+登录态</text>
<text x="170" y="270" fill="#8b949e" font-size="9" text-anchor="middle">平台看到的就是"人在操作"</text>

<rect x="350" y="218" width="300" height="56" rx="6" fill="#0f2d1a" stroke="#3fb950"/>
<text x="500" y="240" fill="#7ee787" font-size="11" font-weight="700" text-anchor="middle">极低 ✓</text>
<text x="500" y="258" fill="#8b949e" font-size="9" text-anchor="middle">同 A,LLM 只做字段映射</text>
<text x="500" y="270" fill="#8b949e" font-size="9" text-anchor="middle">不改变本地执行的真实性</text>

<text x="30" y="352" fill="#f85149" font-size="9">✗ 复杂开放题(纯规则)</text>
<text x="30" y="367" fill="#f85149" font-size="9">✗ 跨页多步自主决策</text>

<rect x="350" y="304" width="300" height="72" rx="6" fill="#161b22" stroke="#21262d"/>
<text x="360" y="322" fill="#56d364" font-size="9">✓ A 的全部能力</text>
<text x="360" y="337" fill="#56d364" font-size="9">✓ 智能字段映射(陌生表单)</text>
<text x="360" y="352" fill="#56d364" font-size="9">✓ 开放题 AI 生成答案</text>
<text x="360" y="367" fill="#56d364" font-size="9">✓ JD 匹配 + 简历定制</text>

<rect x="680" y="304" width="300" height="72" rx="6" fill="#161b22" stroke="#21262d"/>
<text x="690" y="322" fill="#56d364" font-size="9">✓ B 的全部能力</text>
<text x="690" y="337" fill="#56d364" font-size="9">✓ 跨页多步自主导航</text>
<text x="690" y="352" fill="#56d364" font-size="9">✓ 批量定时投递</text>
<text x="690" y="367" fill="#56d364" font-size="9">✓ bash/文件/截图全能力</text>

<!-- Row: Difficulty -->
<text x="20" y="400" fill="#484f58" font-size="9" font-weight="600" letter-spacing="1">实现难度 / 成本</text>
<rect x="20" y="406" width="300" height="64" rx="6" fill="#161b22" stroke="#21262d"/>
<text x="170" y="426" fill="#56d364" font-size="11" font-weight="700" text-anchor="middle">★★☆☆☆ 低</text>

<text x="30" y="459" fill="#8b949e" font-size="9">~2-3 周可出 MVP</text>

<rect x="350" y="406" width="300" height="64" rx="6" fill="#161b22" stroke="#21262d"/>

<rect x="350" y="500" width="300" height="52" rx="6" fill="#161b22" stroke="#21262d"/>
<text x="360" y="520" fill="#8b949e" font-size="9">同 A,扩展 + Web 账户</text>
<text x="360" y="536" fill="#8b949e" font-size="9">Web 端管理简历/趋势</text>
