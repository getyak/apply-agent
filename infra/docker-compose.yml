services:
  # ============================================
  # PostgreSQL 16 + pgvector
  # ============================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: relay-postgres
    restart: unless-stopped
    env_file: ../.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # init-db.sh applies forward migrations and skips *.down.sql (CI-only).
      - ./postgres/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
      - ./postgres/migrations:/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ============================================
  # Redis 7 (cache + event bus + session)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: relay-redis
    restart: unless-stopped
    env_file: ../.env
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ============================================
  # MinIO (S3-compatible object storage for local dev)
  # ============================================
  minio:
    image: minio/minio:latest
    container_name: relay-minio
    restart: unless-stopped
    env_file: ../.env
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  # auto-create the default bucket on first start
  minio-init:
    image: minio/mc:latest
    container_name: relay-minio-init
    env_file: ../.env
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${S3_ACCESS_KEY} ${S3_SECRET_KEY};
        mc mb --ignore-existing local/${S3_BUCKET};
        mc anonymous set download local/${S3_BUCKET}/public;
        echo 'Bucket ${S3_BUCKET} ready';
      "

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
