# Purpose: keep deps fresh while minimizing PR noise for a solo project.
# When to edit: when adding a new package manager, a new submodule, or
# when a dep keeps breaking on auto-bump (add to ignore).
#
# Dormant entries (re-add when directories are created):
#   pip / agents  → add back when agents/ directory exists
#   docker / infra → add back when Dockerfiles exist (infra/ has only docker-compose.yml)

version: 2
updates:
  # ─── Web + API (Bun / npm) ────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
      types:
        patterns: ["@types/*"]
    labels: ["chore", "deps", "scope:web"]
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    ignore:
      # Manual review required — Next.js majors regularly break app router.
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      # Hono majors change middleware contract.
      - dependency-name: "hono"
        update-types: ["version-update:semver-major"]
      # React 19 + server components churn — manual.
      - dependency-name: "react"
      - dependency-name: "react-dom"

  # ─── GitHub Actions ───────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels: ["chore", "ci"]
    commit-message:
      prefix: "ci(deps)"
    groups:
      actions:
        patterns: ["*"]
