# ============================================================================
# Relay 主 CI · paths-filter 矩阵分流
# 触发：PR open/sync、push 到 main
# Secrets：无（公开 actions only）
# Cache keys：
#   - bun-${{ hashFiles('**/bun.lockb') }}
#   - nextjs-${{ hashFiles('web/**/*.[jt]s', 'web/**/*.[jt]sx') }}
#
# Jobs gated by path:
#   api      → api/**
#   web      → web/**   (Next.js lives at web/, not apps/web/)
#
# Dormant jobs (code not yet in repo, re-enable when dirs are created):
#   agents   → agents/**   (Python/LangGraph — add back when agents/ exists)
#   extension → apps/extension/**  (MV3 — add back when apps/extension/ exists)
#   eval     → eval/**     (Promptfoo — add back when eval/ exists)
# ============================================================================
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# 同一 PR 后续 push 自动取消旧 run，省 free-tier minutes
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write  # 用于失败时贴 comment

jobs:
  # ---- 第 1 步：检测改动范围，决定要跑哪些 job ----
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      infra: ${{ steps.filter.outputs.infra }}
      docs: ${{ steps.filter.outputs.docs }}
      scripts: ${{ steps.filter.outputs.scripts }}
      # Future: uncomment when directories exist
      # agents:    ${{ steps.filter.outputs.agents }}
      # extension: ${{ steps.filter.outputs.extension }}
      # eval:      ${{ steps.filter.outputs.eval }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            api:
              - 'api/**'
              - 'package.json'
              - 'bun.lock'
            web:
              - 'web/**'
            infra:
              - 'infra/**'
            docs:
              - 'docs/**'
            scripts:
              - 'scripts/**'
            # Uncomment when directories are created:
            # agents:
            #   - 'agents/**'
            #   - 'pyproject.toml'
            #   - 'uv.lock'
            # extension:
            #   - 'apps/extension/**'
            # eval:
            #   - 'eval/**'
            #   - 'agents/prompts/**'

  # ---- API job (Hono + Bun) ----
  api:
    name: API (Hono/Bun)
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun deps
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install
        working-directory: api
        run: bun install --frozen-lockfile

      - name: Lint
        working-directory: api
        run: bun run lint

      - name: Typecheck
        working-directory: api
        run: bun run typecheck

      - name: Test
        working-directory: api
        run: bun test

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: api-coverage-${{ github.run_id }}
          path: api/coverage/
          retention-days: 7

  # ---- Web job (Next.js) — lives at web/, not apps/web/ ----
  web:
    name: Web (Next.js)
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun deps
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Cache Next.js build
        uses: actions/cache@v5
        with:
          path: web/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('web/bun.lock') }}-${{ hashFiles('web/**/*.[jt]s', 'web/**/*.[jt]sx') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('web/bun.lock') }}-

      - name: Install
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Lint
        working-directory: web
        run: bun run lint

      - name: Typecheck
        working-directory: web
        run: bun run typecheck

      - name: Build
        working-directory: web
        run: bun run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

