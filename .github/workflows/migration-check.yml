# ============================================================================
# DB Migration 正向 + 回滚校验
# 触发：PR 改动 infra/postgres/migrations/**
# Secrets：无
# 失败时：psql 日志贴回 PR comment
# ============================================================================
name: Migration Check

on:
  pull_request:
    paths:
      - 'infra/postgres/migrations/**'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: migration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  forward-and-rollback:
    name: Forward + Rollback
    runs-on: ubuntu-latest
    timeout-minutes: 12

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: relay
          POSTGRES_PASSWORD: relay
          POSTGRES_DB: relay_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U relay"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      PGHOST: localhost
      PGPORT: 5433
      PGUSER: relay
      PGPASSWORD: relay
      PGDATABASE: relay_test

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pgTAP
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          sudo apt-get install -y libtap-parser-sourcehandler-pgtap-perl || true

      - name: Forward apply (full)
        id: forward
        run: |
          set -e
          mkdir -p /tmp/migration-logs
          for f in infra/postgres/migrations/*.sql; do
            [[ "$f" == *.down.sql ]] && continue
            echo "==> Applying $f"
            psql -v ON_ERROR_STOP=1 -f "$f" 2>&1 | tee -a /tmp/migration-logs/forward.log
          done

      - name: pgTAP critical assertions
        run: |
          psql -v ON_ERROR_STOP=1 -c "
            SELECT 1 FROM pg_extension WHERE extname='vector';
            SELECT 1 FROM pg_indexes WHERE indexname LIKE '%resumes%vector%';
            SELECT 1 FROM information_schema.columns
              WHERE table_name='resumes' AND column_name='version';
            SELECT 1 FROM information_schema.columns
              WHERE table_name='user_files' AND column_name='deleted_at';
          "

      - name: Detect new migrations in PR
        id: detect
        run: |
          NEW_MIGRATIONS=$(git diff --name-only --diff-filter=A origin/main...HEAD -- 'infra/postgres/migrations/*.sql' | grep -v '\.down\.sql$' || true)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$NEW_MIGRATIONS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Rollback newly added migrations
        if: steps.detect.outputs.files != ''
        run: |
          set -e
          for f in $(echo "${{ steps.detect.outputs.files }}" | tac); do
            DOWN="${f%.sql}.down.sql"
            if [[ ! -f "$DOWN" ]]; then
              echo "::error::Missing rollback file $DOWN for $f"
              exit 1
            fi
            echo "==> Rolling back via $DOWN"
            psql -v ON_ERROR_STOP=1 -f "$DOWN" 2>&1 | tee -a /tmp/migration-logs/rollback.log
          done

      - name: Re-apply (idempotency check)
        if: steps.detect.outputs.files != ''
        run: |
          set -e
          for f in ${{ steps.detect.outputs.files }}; do
            echo "==> Re-applying $f"
            psql -v ON_ERROR_STOP=1 -f "$f" 2>&1 | tee -a /tmp/migration-logs/reapply.log
          done

      - name: Post failure log to PR
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const dir = '/tmp/migration-logs';
            let body = '## Migration check failed\n\n';
            for (const f of fs.readdirSync(dir)) {
              const log = fs.readFileSync(path.join(dir, f), 'utf8').slice(-3000);
              body += `<details><summary>${f}</summary>\n\n\`\`\`\n${log}\n\`\`\`\n</details>\n`;
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: migration-logs-${{ github.run_id }}
          path: /tmp/migration-logs/
          retention-days: 14
