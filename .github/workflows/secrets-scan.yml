# ============================================================================
# Secrets 扫描 (SEC-011)
# 触发：所有 PR + push 到 main
# 行为：gitleaks 扫描完整 diff，发现硬编码密钥即 fail。
#
# 与 lefthook 的关系：lefthook 的 `forbid-api-keys` pre-commit 在推送前拦截，
# 但只看暂存 diff、且本地可被 --no-verify 绕过。本 CI workflow 是互补的最后一道
# 墙——任何绕过本地 hook 的密钥都会在 PR / main 上被 gitleaks 全量 diff 抓到。
#
# 实现：直接用 gitleaks CLI binary（MIT 永久免费），不走 gitleaks/gitleaks-action
# wrapper —— 后者 2024 起对 GitHub Org 账户硬性要求 GITLEAKS_LICENSE，否则
# step 直接 fail（"[getyak] is an organization. License key is required."）。
#
# 规则源：.gitleaks.toml（extend default + Relay 专属 key 规则 + allowlist）。
# ============================================================================
name: Secrets Scan

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
        with:
          # 全量历史：detect 命令需要遍历完整 commit graph。
          fetch-depth: 0

      - name: Install gitleaks CLI
        run: |
          set -euo pipefail
          GITLEAKS_VERSION="8.21.2"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Scan for secrets
        run: |
          set -euo pipefail
          # detect 默认扫描整个 git 历史；--redact 让发现的 secret 在日志里被打码；
          # --exit-code 1 保证扫到 secret 时 step 失败。
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --redact \
            --verbose \
            --exit-code 1 \
            --report-format sarif \
            --report-path gitleaks.sarif

      - name: Upload SARIF
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gitleaks-sarif-${{ github.run_id }}
          path: gitleaks.sarif
          retention-days: 30
          if-no-files-found: ignore
