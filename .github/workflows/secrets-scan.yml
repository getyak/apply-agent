# ============================================================================
# Secrets 扫描 (SEC-011)
# 触发：所有 PR + push 到 main
# 行为：gitleaks 扫描完整 diff，发现硬编码密钥即 fail。
#
# 与 lefthook 的关系：lefthook 的 `forbid-api-keys` pre-commit 在推送前拦截，
# 但只看暂存 diff、且本地可被 --no-verify 绕过。本 CI workflow 是互补的最后一道
# 墙——任何绕过本地 hook 的密钥都会在 PR / main 上被 gitleaks 全量 diff 抓到。
#
# License/token：gitleaks-action v2 对开源仓库无需任何 token（GITHUB_TOKEN
# 已足够发 PR 评论）。仅当扫描私有 org 仓库时才需 GITLEAKS_LICENSE。
#
# 规则源：.gitleaks.toml（extend default + Relay 专属 key 规则 + allowlist）。
# ============================================================================
name: Secrets Scan

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # 全量历史：PR 模式按 base..head diff 扫描；
          # push 到 main 时 gitleaks-action 扫描本次推送的提交范围。
          fetch-depth: 0

      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          # 在 PR 上以 inline comment 报告泄露位置。
          GITLEAKS_ENABLE_COMMENTS: true
          # 不上传扫描结果到 gitleaks SaaS。
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: false
